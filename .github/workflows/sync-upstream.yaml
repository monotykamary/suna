name: Sync with Upstream

on:
  schedule:
    - cron: '0 * * * *' # Run every hour
  workflow_dispatch: # Allow manual triggering

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0 # Fetch all history for rebase

    - name: Add upstream remote
      run: git remote add upstream https://github.com/kortix-ai/suna.git
      continue-on-error: true # Continue if remote already exists

    - name: Fetch upstream changes
      run: git fetch upstream

    - name: Merge upstream changes
      run: git merge upstream/main -m "Merge upstream changes"

    - name: Push changes
      run: git push origin main
